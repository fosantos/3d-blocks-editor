
<style>

#modal select, #modal input[type=text] { width: 100%; background: #000; border: 0.5px solid #333; color: #ccc; font-size: 12px; padding: 6px 8px; border-radius: 6px; font-family: inherit; outline: none; }

<div id="root">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <input id="inline-editor" type="text" maxlength="20" />
    <div id="desc-panel">
      <div id="desc-panel-title"><span id="desc-block-name"></span><button id="desc-edit-btn" onclick="toggleDescEdit()">editar</button></div>
      <div id="desc-text" class="empty">sem descrição</div>
      <textarea id="desc-textarea" rows="4" maxlength="300" placeholder="Escreve uma descrição…"></textarea>
      <button id="desc-save-btn" onclick="saveDesc()">Guardar</button>
    </div>
    <div id="toast"></div>
    <div id="modal-overlay">
      <div id="modal">
        <h3>Novo bloco</h3>
        <label>Nome do bloco</label>
        <input type="text" id="new-label" placeholder="ex: API, DB, Cache…" maxlength="20" />
        <label>Conectar a (opcional)</label>
        <select id="connect-select"><option value="">— sem conexão —</option></select>
        <div class="modal-row">
          <button class="modal-btn" onclick="closeModal()">Cancelar</button>
          <button class="modal-btn confirm" onclick="confirmCreate()">Criar</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toolbar-v">
    <div class="button-group">
      <button class="tb-btn active" id="btn-add" onclick="startAdd()">+ Bloco</button>
      <button class="tb-btn danger" id="btn-delete" onclick="startDelete()">Deletar</button>
      <button class="tb-btn" onclick="resetMode()">Cancelar</button>
      <button class="tb-btn" onclick="saveStateWithFeedback()" title="Guardar estado">Salvar</button>
      <button class="tb-btn" onclick="clearSavedState()" title="Eliminar estado guardado">Redefinir</button>
    </div>
    <div class="info-group">
      <span id="status">0/10</span>
    </div>
  </div>
  <div id="status-bar">
    <span id="hint">clica num bloco, depois noutro para conectar · duplo clique: editar nome</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const wrap   = document.getElementById('canvas-wrap');
const ctx    = canvas.getContext('2d');
const editor = document.getElementById('inline-editor');
const descPanel = document.getElementById('desc-panel');
const toastEl   = document.getElementById('toast');

let W, H;
function resize() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width = W; canvas.height = H; draw();
}
const ro = new ResizeObserver(resize);
ro.observe(wrap);

const MAX   = 10;
const PERSP = 600;
const ZOOM  = 1.75;

let blocks = [], connections = [];
let selected      = null;   // currently selected block
let pendingConn   = null;   // first block clicked — waiting for second click to connect
let mode          = 'none'; // none | add | delete
let dragBlock     = null;
let dragOX = 0, dragOY = 0, dragMoved = false;
let hovered       = null;
let editingBlock  = null;
let descBlock     = null;
let idCounter     = 0;
let toastTimer    = null;

// ── Persistence ─────────────────────────────────────────────────
const STORAGE_KEY = '3d-blocks-editor-state';
function saveState() {
  try {
    const state = {
      blocks: blocks.map(b => ({...b})), // clone
      connections: [...connections],
      idCounter
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn('Failed to save state:', e); }
}
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const state = JSON.parse(saved);
    if (!state.blocks || !Array.isArray(state.blocks)) return false;
    blocks = state.blocks;
    connections = state.connections || [];
    idCounter = state.idCounter || blocks.reduce((max,b)=>Math.max(max,b.id||0),0);
    return true;
  } catch(e) { console.warn('Failed to load state:', e); return false; }
}
function clearSavedState() {
  // Close any open panels/editors
  closeEditor(true);
  closeDescPanel();
  closeModal();

  // Clear current state
  blocks = [];
  connections = [];
  selected = null;
  pendingConn = null;
  mode = 'none';
  descBlock = null;
  idCounter = 0;

  // Clear saved state from localStorage
  localStorage.removeItem(STORAGE_KEY);

  // Recreate default demo blocks
  const W = wrap.clientWidth, H = wrap.clientHeight;
  [{x:W*.28,y:H*.42,z:0,  label:'API',   desc:'Gateway de entrada. Gere autenticação e rate limiting.'},
   {x:W*.65,y:H*.38,z:80,  label:'Cache', desc:'Redis. TTL de 5 min para respostas frequentes.'},
   {x:W*.48,y:H*.65,z:160, label:'DB',    desc:'PostgreSQL. Base de dados principal da aplicação.'}]
  .forEach(d=>{idCounter++;blocks.push({id:idCounter,label:d.label,desc:d.desc,x:d.x,y:d.y,z:d.z,w:90,h:56,zScale:1});});
  connections.push({from:1,to:2},{from:2,to:3});

  // Reset UI
  setActiveBtn(null);
  updateStatus();
  draw();
  showToast('Estado redefinido ✓');
}

// ── Projection ────────────────────────────────────────────────
function project(x, y, z) {
  const s  = PERSP / (PERSP + z);
  const sc = s * ZOOM;
  return { px: W/2 + (x - W/2)*sc, py: H/2 + (y - H/2)*sc, scale: sc };
}
function corners(b) {
  const hw=b.w/2, hh=b.h/2;
  const f=[{x:b.x-hw,y:b.y-hh,z:b.z},{x:b.x+hw,y:b.y-hh,z:b.z},{x:b.x+hw,y:b.y+hh,z:b.z},{x:b.x-hw,y:b.y+hh,z:b.z}];
  return { f, bk: f.map(p=>({...p,z:p.z+40})) };
}
function fInfo(b) {
  const {f}=corners(b), pf=f.map(p=>project(p.x,p.y,p.z));
  const cx=pf.reduce((s,p)=>s+p.px,0)/4, cy=pf.reduce((s,p)=>s+p.py,0)/4;
  return { pf, cx, cy, sc:pf[0].scale,
    minX:Math.min(...pf.map(p=>p.px)), maxX:Math.max(...pf.map(p=>p.px)),
    minY:Math.min(...pf.map(p=>p.py)), maxY:Math.max(...pf.map(p=>p.py)) };
}
function iconPos(b) {
  const {maxX,minY,sc}=fInfo(b), r=Math.max(7,8*sc);
  return {x:maxX-r-2,y:minY+r+2,r};
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
  toastEl.textContent=msg; toastEl.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.style.display='none',1800);
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='#0f0f0f'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // connections
  for(const c of connections){
    const a=blocks.find(b=>b.id===c.from), b2=blocks.find(b=>b.id===c.to);
    if(!a||!b2) continue;
    const pa=project(a.x,a.y,a.z+20), pb=project(b2.x,b2.y,b2.z+20);
    ctx.beginPath(); ctx.moveTo(pa.px,pa.py); ctx.lineTo(pb.px,pb.py);
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
    ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    const mx=(pa.px+pb.px)/2, my=(pa.py+pb.py)/2;
    ctx.beginPath(); ctx.arc(mx,my,2.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
  }

  // ghost line: pendingConn → hovered (if different block)
  if(pendingConn && hovered && hovered.id!==pendingConn.id && mode==='none') {
    const pa=project(pendingConn.x,pendingConn.y,pendingConn.z+20);
    const pb=project(hovered.x,hovered.y,hovered.z+20);
    ctx.beginPath(); ctx.moveTo(pa.px,pa.py); ctx.lineTo(pb.px,pb.py);
    ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1;
    ctx.setLineDash([3,7]); ctx.stroke(); ctx.setLineDash([]);
  }

  // blocks (far → near)
  const sorted=[...blocks].sort((a,b)=>(b.z+20)-(a.z+20));
  for(const b of sorted) drawBlock(b);

  // Z ruler
  const rh=H-80, rx=W-20;
  ctx.strokeStyle='#222'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(rx,40); ctx.lineTo(rx,40+rh); ctx.stroke();
  for(let i=0;i<=10;i++){const ry=40+(i/10)*rh;ctx.beginPath();ctx.moveTo(rx-4,ry);ctx.lineTo(rx+4,ry);ctx.stroke();}
  for(const b of blocks){
    const ry=40+(b.z/400)*rh;
    ctx.beginPath(); ctx.arc(rx,ry,4,0,Math.PI*2);
    ctx.fillStyle=(selected&&selected.id===b.id)?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.35)';
    ctx.fill();
  }
  ctx.fillStyle='#888'; ctx.font='500 11px sans-serif'; ctx.textAlign='right';
  ctx.fillText('+ próximo',rx-8,36); ctx.fillText('+ fundo',rx-8,40+rh+12);
}

function drawBlock(b) {
  const {f,bk}=corners(b);
  const pf=f.map(p=>project(p.x,p.y,p.z));
  const pb=bk.map(p=>project(p.x,p.y,p.z));
  const isSel   = selected      && selected.id      === b.id;
  const isPend  = pendingConn   && pendingConn.id    === b.id;
  const isEdit  = editingBlock  && editingBlock.id   === b.id;
  const isDesc  = descBlock     && descBlock.id      === b.id;
  const isHov   = hovered       && hovered.id        === b.id;
  const isConn  = selected && selected.id!==b.id && connections.find(c=>(c.from===selected.id&&c.to===b.id)||(c.from===b.id&&c.to===selected.id));
  const alpha   = isSel||isEdit||isDesc||isPend ? 1 : isHov ? 0.88 : 0.65;
  const sw      = isSel||isEdit||isDesc||isPend ? 1.5 : 1;

  // side faces
  [[pf[0],pf[3],pb[3],pb[0]],[pf[1],pf[2],pb[2],pb[1]],[pf[0],pf[1],pb[1],pb[0]],[pf[3],pf[2],pb[2],pb[3]]].forEach(s=>{
    ctx.beginPath(); ctx.moveTo(s[0].px,s[0].py);
    for(let i=1;i<s.length;i++) ctx.lineTo(s[i].px,s[i].py);
    ctx.closePath(); ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fill();
    ctx.strokeStyle=`rgba(255,255,255,${alpha*.4})`; ctx.lineWidth=sw*.7; ctx.stroke();
  });
  // back face
  ctx.beginPath(); ctx.moveTo(pb[0].px,pb[0].py);
  pb.forEach((p,i)=>{if(i>0)ctx.lineTo(p.px,p.py);}); ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.01)'; ctx.fill();
  ctx.strokeStyle=`rgba(255,255,255,${alpha*.3})`; ctx.lineWidth=sw*.7; ctx.stroke();
  // front face
  ctx.beginPath(); ctx.moveTo(pf[0].px,pf[0].py);
  pf.forEach((p,i)=>{if(i>0)ctx.lineTo(p.px,p.py);}); ctx.closePath();
  ctx.fillStyle=`rgba(255,255,255,${0.04+Math.max(0,1-b.z/400)*0.04})`; ctx.fill();
  // stroke color logic
  if      (isPend)  ctx.strokeStyle='rgba(255,255,255,1)';
  else if (isSel)   ctx.strokeStyle='rgba(255,255,255,1)';
  else if (isConn)  ctx.strokeStyle='rgba(255,255,255,0.65)';
  else              ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
  ctx.lineWidth=sw; ctx.stroke();

  // glow for selected or pending
  if((isSel||isPend) && !isEdit) {
    ctx.shadowColor = isPend ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.25)';
    ctx.shadowBlur=16;
    ctx.beginPath(); ctx.moveTo(pf[0].px,pf[0].py);
    pf.forEach((p,i)=>{if(i>0)ctx.lineTo(p.px,p.py);}); ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,1)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.shadowBlur=0;
  }

  const {cx,cy,sc}=fInfo(b);
  if(!isEdit) {
    ctx.fillStyle=`rgba(255,255,255,${alpha*.92})`;
    ctx.font=`500 ${Math.round(13*sc)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.label,cx,cy);
    ctx.fillStyle=`rgba(255,255,255,${alpha*.35})`;
    ctx.font=`${Math.round(10*sc)}px sans-serif`;
    ctx.fillText(`z${Math.round((1-b.z/400)*10)}`,cx,cy+15*sc);
  }

  // ⓘ badge
  const {x:ix,y:iy,r:ir}=iconPos(b);
  const hasDesc=b.desc&&b.desc.trim().length>0;
  const isDescOpen=descBlock&&descBlock.id===b.id;
  ctx.beginPath(); ctx.arc(ix,iy,ir,0,Math.PI*2);
  ctx.fillStyle=isDescOpen?'rgba(255,255,255,0.9)':hasDesc?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.07)';
  ctx.fill(); ctx.strokeStyle=`rgba(255,255,255,${alpha*.5})`; ctx.lineWidth=0.5; ctx.stroke();
  ctx.fillStyle=isDescOpen?'#000':`rgba(255,255,255,${alpha*.8})`;
  ctx.font=`500 ${Math.round(ir*1.1)}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('i',ix,iy+0.5);

  if(mode==='delete') {
    ctx.fillStyle='rgba(220,60,60,0.85)';
    ctx.font=`${Math.round(13*sc)}px sans-serif`;
    ctx.textAlign='center';
    ctx.fillText('×',cx-32*sc,cy-15*sc);
  }
}

// ── Connection toggle ─────────────────────────────────────────
function toggleConn(a,b2) {
  const from=a.id,to=b2.id;
  const ex=connections.find(c=>(c.from===from&&c.to===to)||(c.from===to&&c.to===from));
  if(ex){connections=connections.filter(c=>!((c.from===from&&c.to===to)||(c.from===to&&c.to===from)));showToast(`${a.label} ↔ ${b2.label} desligados`);}
  else  {connections.push({from,to}); showToast(`${a.label} ↔ ${b2.label} ligados`);}
}

// ── Hit tests ─────────────────────────────────────────────────
function hitTest(mx,my) {
  const sorted=[...blocks].sort((a,b)=>a.z-b.z);
  for(const b of sorted){const {f}=corners(b);const pf=f.map(p=>project(p.x,p.y,p.z));if(pip(mx,my,pf.map(p=>({x:p.px,y:p.py})))) return b;}
  return null;
}
function hitIcon(mx,my){for(const b of blocks){const {x,y,r}=iconPos(b);if(Math.hypot(mx-x,my-y)<=r+3) return b;} return null;}
function pip(px,py,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;}
  return inside;
}

// ── Mouse events ──────────────────────────────────────────────
let mouseDownBlock=null, mouseDownX=0, mouseDownY=0;

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  hovered=hitTest(mx,my);
  canvas.style.cursor=dragBlock?'grabbing':hitIcon(mx,my)||hovered?'pointer':'default';
  if(dragBlock){
    dragBlock.x=mx-dragOX; dragBlock.y=my-dragOY; dragMoved=true;
    if(descBlock) repositionDesc();
  }
  draw();
});

canvas.addEventListener('mousedown',e=>{
  if(editingBlock) return;
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  mouseDownX=mx; mouseDownY=my; dragMoved=false;

  // ⓘ icon takes priority
  const ib=hitIcon(mx,my);
  if(ib && mode==='none'){
    mouseDownBlock=null;
    if(descBlock&&descBlock.id===ib.id) closeDescPanel(); else{closeDescPanel();openDescPanel(ib);}
    return;
  }

  const b=hitTest(mx,my);
  mouseDownBlock=b;

  if(mode==='add'){if(blocks.length<MAX) openModal(mx,my); return;}
  if(mode==='delete'&&b){deleteBlock(b); mouseDownBlock=null; return;}

  if(b){selected=b; dragBlock=b; dragOX=mx-b.x; dragOY=my-b.y; canvas.style.cursor='grabbing';}
  else {selected=null; pendingConn=null;}
  draw();
});

canvas.addEventListener('mouseup',e=>{
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const dist=Math.hypot(mx-mouseDownX, my-mouseDownY);
  const isClick=dist<5; // movement < 5px = click, not drag

  if(isClick && mouseDownBlock && mode==='none'){
    const b=mouseDownBlock;
    if(pendingConn){
      if(pendingConn.id===b.id){
        // clicked same block → cancel pending
        pendingConn=null;
        showToast('seleção de conexão cancelada');
      } else {
        // clicked different block → connect!
        toggleConn(pendingConn, b);
        pendingConn=null;
        selected=b;
      }
    } else {
      // first click → set as pending connection source
      pendingConn=b;
      selected=b;
    }
  }

  if(!isClick || !mouseDownBlock) {
    // drag happened or clicked empty space → clear pending
    if(!mouseDownBlock) pendingConn=null;
  }

  dragBlock=null; dragMoved=false; mouseDownBlock=null;
  canvas.style.cursor=hovered?'pointer':'default';
  draw();
});

canvas.addEventListener('dblclick',e=>{
  const r=canvas.getBoundingClientRect();
  const b=hitTest(e.clientX-r.left,e.clientY-r.top);
  if(!b||mode!=='none') return;
  e.preventDefault(); pendingConn=null; dragBlock=null; openEditor(b);
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const b=hitTest(e.clientX-r.left,e.clientY-r.top)||selected;
  if(!b) return;
  b.z=Math.max(0,Math.min(360,b.z+e.deltaY*0.4));
  if(descBlock&&descBlock.id===b.id) repositionDesc();
  draw();
},{passive:false});

// Close desc panel when clicking outside of it (but not on icon)
canvas.addEventListener('mousedown',e=>{
  if(descBlock) {
    const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    const ib=hitIcon(mx,my);
    if(!ib && !e.target.closest('#desc-panel')) {
      closeDescPanel();
    }
  }
});

document.addEventListener('keydown',e=>{
  if(editingBlock||document.activeElement===document.getElementById('desc-textarea')) return;
  if(e.key==='Escape'){pendingConn=null; draw(); return;}
  if(!selected) return;
  const m={'ArrowLeft':[-10,0],'ArrowRight':[10,0],'ArrowUp':[0,-10],'ArrowDown':[0,10]};
  if(m[e.key]){selected.x+=m[e.key][0];selected.y+=m[e.key][1];if(descBlock)repositionDesc();draw();return;}
  if(e.key==='+'||e.key==='='){selected.z=Math.max(0,selected.z-20);draw();}
  if(e.key==='-'){selected.z=Math.min(360,selected.z+20);draw();}
  if(e.key==='Delete'||e.key==='Backspace'){deleteBlock(selected);selected=null;pendingConn=null;}
});

// ── Inline label editor ───────────────────────────────────────
function openEditor(b){
  editingBlock=b; selected=b;
  const {minX,maxX,minY,maxY,cx,cy,sc}=fInfo(b);
  const ew=Math.max(60,(maxX-minX)*.82), eh=Math.max(22,(maxY-minY)*.42);
  editor.style.cssText=['display:block',`left:${cx-ew/2}px`,`top:${cy-eh/2}px`,`width:${ew}px`,`height:${eh}px`,`font-size:${Math.max(11,Math.round(13*sc))}px`,`line-height:${eh}px`].join(';');
  editor.value=b.label; draw();
  setTimeout(()=>{editor.focus();editor.select();},20);
}
function closeEditor(save){
  if(!editingBlock) return;
  if(save){const v=editor.value.trim();if(v.length>0)editingBlock.label=v;}
  editingBlock=null; editor.style.display='none'; draw();
  if(descBlock) document.getElementById('desc-block-name').textContent=descBlock.label;
}
editor.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();closeEditor(true);}if(e.key==='Escape')closeEditor(false);e.stopPropagation();});
editor.addEventListener('blur',()=>closeEditor(true));

// ── Description panel ─────────────────────────────────────────
function openDescPanel(b){
  descBlock=b;
  document.getElementById('desc-block-name').textContent=b.label;
  setDescRead(b); repositionDesc(); descPanel.style.display='block'; draw();
}
function repositionDesc(){
  if(!descBlock) return;
  const {x:ix,y:iy}=iconPos(descBlock), pw=200, ph=140;
  let l=ix+12, t=iy-20;
  if(l+pw>W-10) l=ix-pw-12;
  if(t+ph>H-10) t=H-ph-10;
  if(t<4) t=4;
  descPanel.style.left=l+'px'; descPanel.style.top=t+'px';
}
function setDescRead(b){
  const dt=document.getElementById('desc-text'),ta=document.getElementById('desc-textarea');
  const sb=document.getElementById('desc-save-btn'),eb=document.getElementById('desc-edit-btn');
  const c=b&&b.desc&&b.desc.trim();
  dt.textContent=c||'sem descrição'; dt.className=c?'':'empty';
  dt.style.display='block'; ta.style.display='none'; sb.style.display='none'; eb.textContent='editar';
}
function toggleDescEdit(){
  if(!descBlock) return;
  const dt=document.getElementById('desc-text'),ta=document.getElementById('desc-textarea');
  const sb=document.getElementById('desc-save-btn'),eb=document.getElementById('desc-edit-btn');
  if(ta.style.display==='none'){ta.value=descBlock.desc||'';dt.style.display='none';ta.style.display='block';sb.style.display='block';eb.textContent='cancelar';ta.focus();}
  else setDescRead(descBlock);
}
function saveDesc(){if(!descBlock)return;descBlock.desc=document.getElementById('desc-textarea').value.trim();setDescRead(descBlock);draw();}
function closeDescPanel(){descBlock=null;descPanel.style.display='none';draw();}
document.getElementById('desc-textarea').addEventListener('keydown',e=>{if(e.key==='Escape')setDescRead(descBlock);e.stopPropagation();});

// ── Toolbar ───────────────────────────────────────────────────
function startAdd()   {closeEditor(true);closeDescPanel();if(blocks.length>=MAX){updateStatus();return;}mode='add';setActiveBtn('btn-add');updateStatus();}
function startDelete(){closeEditor(true);closeDescPanel();mode='delete';setActiveBtn('btn-delete');updateStatus();}
function resetMode()  {closeEditor(true);closeDescPanel();mode='none';selected=null;pendingConn=null;setActiveBtn(null);draw();updateStatus();}
function setActiveBtn(id){['btn-add','btn-delete','btn-save'].forEach(b=>{if(b)document.getElementById(b)?.classList.remove('active')});if(id)document.getElementById(id)?.classList.add('active');}
function updateStatus(){document.getElementById('status').textContent=`${blocks.length}/10${mode!=='none'?' · '+mode:''}`;}
function saveStateWithFeedback() {
  saveState();
  showToast('Estado guardado ✓');
  setActiveBtn('btn-save');
  setTimeout(()=>setActiveBtn(null), 1500);
}

// ── Modal ─────────────────────────────────────────────────────
let pX,pY;
function openModal(x,y){
  pX=x;pY=y;
  const sel=document.getElementById('connect-select');
  sel.innerHTML='<option value="">— sem conexão —</option>';
  blocks.forEach(b=>{const o=document.createElement('option');o.value=b.id;o.textContent=b.label;sel.appendChild(o);});
  document.getElementById('new-label').value='';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('new-label').focus(),50);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');mode='none';setActiveBtn(null);updateStatus();}
function confirmCreate(){const raw=document.getElementById('new-label').value.trim();const cid=document.getElementById('connect-select').value;createBlock(pX,pY,cid||null,raw);closeModal();}
document.getElementById('new-label').addEventListener('keydown',e=>{if(e.key==='Enter')confirmCreate();if(e.key==='Escape')closeModal();});

function createBlock(x,y,cid,lbl){
  idCounter++;
  const b={id:idCounter,label:lbl&&lbl.length?lbl:`B${idCounter}`,desc:'',x,y,z:0,w:90,h:56,zScale:1};
  blocks.push(b);
  if(cid){const to=parseInt(cid);if(!connections.find(c=>(c.from===b.id&&c.to===to)||(c.from===to&&c.to===b.id)))connections.push({from:b.id,to});}
  selected=b;mode='none';setActiveBtn(null);updateStatus();draw();
}
function deleteBlock(b){
  connections=connections.filter(c=>c.from!==b.id&&c.to!==b.id);
  blocks=blocks.filter(bl=>bl.id!==b.id);
  if(selected&&selected.id===b.id)selected=null;
  if(pendingConn&&pendingConn.id===b.id)pendingConn=null;
  if(descBlock&&descBlock.id===b.id)closeDescPanel();
  draw();updateStatus();
}

// ── Init ──────────────────────────────────────────────────────
setTimeout(()=>{
  W=wrap.clientWidth; H=wrap.clientHeight; canvas.width=W; canvas.height=H;

  // Try to load saved state first
  if (!loadState()) {
    // No saved state — create defaults for a second brain
    [{x:W*.35,y:H*.40,z:0,   label:'Ideias',  desc:'Brainstormings, pensamentos e insights para explorar.'},
     {x:W*.60,y:H*.50,z:80,  label:'Tarefas', 'Ações concretas a realizar, organizadas por prioridade.'},
     {x:W*.45,y:H*.70,z:160, label:'Metas',   desc:'Objetivos de longo prazo e visão de futuro.'}]
    .forEach(d=>{idCounter++;blocks.push({id:idCounter,label:d.label,desc:d.desc,x:d.x,y:d.y,z:d.z,w:90,h:56,zScale:1});});
    connections.push({from:1,to:2},{from:2,to:3});
  }

  updateStatus(); draw();
},120);
</script>
